# ReadTheDocs configuration for MEDHIRA Expo Persist Secure Store

version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.12"
  commands:
    - pip install -r requirements.txt
    - mkdocs build --strict

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true

python:
  install:
    - requirements: requirements.txt

formats:
  - htmlzip
  - pdf
  - epub